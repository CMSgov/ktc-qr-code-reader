<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#112e51"/>
      <stop offset="100%" style="stop-color:#205493"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f3ce3b"/>
      <stop offset="100%" style="stop-color:#c9a616"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="136" y="120" width="240" height="300" rx="16" ry="16" fill="white" opacity="0.95"/>

  <!-- Clipboard clip (top) -->
  <rect x="196" y="96" width="120" height="48" rx="10" ry="10" fill="url(#gold)"/>
  <rect x="220" y="80" width="72" height="40" rx="8" ry="8" fill="url(#bg)"/>

  <!-- Clipboard lines (representing text/data) -->
  <rect x="172" y="180" width="168" height="12" rx="6" fill="#205493" opacity="0.2"/>
  <rect x="172" y="210" width="140" height="12" rx="6" fill="#205493" opacity="0.2"/>
  <rect x="172" y="240" width="156" height="12" rx="6" fill="#205493" opacity="0.2"/>
  <rect x="172" y="270" width="120" height="12" rx="6" fill="#205493" opacity="0.2"/>
  <rect x="172" y="300" width="148" height="12" rx="6" fill="#205493" opacity="0.2"/>
  <rect x="172" y="330" width="100" height="12" rx="6" fill="#205493" opacity="0.2"/>

  <!-- Bold X slash through clipboard -->
  <line x1="120" y1="110" x2="392" y2="420" stroke="#e31c3d" stroke-width="36" stroke-linecap="round"/>
  <line x1="392" y1="110" x2="120" y2="420" stroke="#e31c3d" stroke-width="36" stroke-linecap="round"/>

  <!-- QR code icon (small, bottom right corner) -->
  <g transform="translate(356, 370)">
    <rect width="80" height="80" rx="10" fill="white" opacity="0.95"/>
    <!-- QR pattern -->
    <rect x="10" y="10" width="24" height="24" rx="3" fill="#112e51"/>
    <rect x="46" y="10" width="24" height="24" rx="3" fill="#112e51"/>
    <rect x="10" y="46" width="24" height="24" rx="3" fill="#112e51"/>
    <rect x="46" y="46" width="12" height="12" rx="2" fill="#112e51"/>
    <rect x="58" y="46" width="12" height="12" rx="2" fill="#0071bc"/>
    <rect x="46" y="58" width="12" height="12" rx="2" fill="#0071bc"/>
    <rect x="58" y="58" width="12" height="12" rx="2" fill="#112e51"/>
    <!-- Inner squares -->
    <rect x="15" y="15" width="14" height="14" rx="2" fill="white"/>
    <rect x="18" y="18" width="8" height="8" rx="1" fill="#112e51"/>
    <rect x="51" y="15" width="14" height="14" rx="2" fill="white"/>
    <rect x="54" y="18" width="8" height="8" rx="1" fill="#112e51"/>
    <rect x="15" y="51" width="14" height="14" rx="2" fill="white"/>
    <rect x="18" y="54" width="8" height="8" rx="1" fill="#112e51"/>
  </g>
</svg>
