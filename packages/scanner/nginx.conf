server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"  always;
    add_header X-Frame-Options         "DENY"     always;
    add_header X-XSS-Protection        "0"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy: scripts from self + trusted CDNs; connect to self only.
    # Adjust script-src hashes and connect-src if your proxy is on a different origin.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
        always;

    # --- Compression ---
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # --- Cache headers ---
    # HTML pages: no-cache so updates are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        # Re-emit security headers (add_header in nested blocks does not inherit)
        add_header X-Content-Type-Options  "nosniff"  always;
        add_header X-Frame-Options         "DENY"     always;
        add_header X-XSS-Protection        "0"        always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
            always;
    }

    # Static assets with content hash in filename: cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
